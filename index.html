<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#0f172a,#1e293b,#4f46e5);
    position:relative;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#ffffff22 2px,transparent 2px);
    background-size:40px 40px;
    animation:moveBg 30s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* Glass Card */
.card{
    position:relative;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:30px;
    text-align:center;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);

    box-shadow:
    0 8px 32px rgba(0,0,0,.3),
    inset 0 0 20px rgba(255,255,255,.1);

    z-index:5;
    animation:pop 1.5s ease;
}

@keyframes pop{
    from{
        opacity:0;
        transform:scale(.5);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

h1{
    color:white;
    font-size:2.3rem;
    margin-bottom:10px;
    text-shadow:0 0 20px #fff;
}

.cake{
    font-size:80px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    50%{
        transform:translateY(-15px);
    }
}

.message{
    color:white;
    font-size:1.1rem;
    line-height:1.7;
    margin-top:15px;
}

/* Button */
.btn{
    margin-top:25px;
    padding:14px 25px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:rgba(255,255,255,.2);
    color:white;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.3);
    font-size:1rem;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,.3);
}

/* Balloons */
.balloon{
    position:absolute;
    bottom:-200px;
    width:70px;
    height:90px;
    border-radius:50%;
    animation:float 10s linear infinite;
}

.balloon::before{
    content:'';
    position:absolute;
    width:2px;
    height:120px;
    background:white;
    left:50%;
    top:90px;
}

.balloon:nth-child(1){
    left:10%;
    background:#ff4d6d;
    animation-delay:0s;
}
.balloon:nth-child(2){
    left:30%;
    background:#ffd60a;
    animation-delay:2s;
}
.balloon:nth-child(3){
    left:60%;
    background:#00f5d4;
    animation-delay:4s;
}
.balloon:nth-child(4){
    left:80%;
    background:#9b5de5;
    animation-delay:6s;
}

@keyframes float{
    0%{
        transform:translateY(0);
    }
    100%{
        transform:translateY(-130vh);
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:12px;
    height:12px;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:
        translateY(110vh)
        rotate(720deg);
    }
}

/* Mobile */
@media(max-width:600px){
    h1{
        font-size:1.8rem;
    }

    .message{
        font-size:1rem;
    }

    .cake{
        font-size:65px;
    }
}
</style>
</head>
<body>

<!-- Balloons -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<!-- Card -->
<div class="card">
    <div class="cake">🎂</div>

    <h1>Happy Birthday!</h1>

    <p class="message">
        Wishing you a day filled with happiness,
        laughter, love, and unforgettable memories.
        May all your dreams come true! ✨💖
    </p>

    <button class="btn" onclick="celebrate()">
        🎉 Celebrate
    </button>
</div>

<script>
// Create Confetti
function createConfetti(){

    const colors=[
        "#ff4d6d",
        "#ffd60a",
        "#00f5d4",
        "#ffffff",
        "#9b5de5",
        "#ff9e00"
    ];

    for(let i=0;i<150;i++){

        const confetti=document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left=Math.random()*100+"vw";
        confetti.style.background=
        colors[Math.floor(Math.random()*colors.length)];

        confetti.style.animationDuration=
        (3+Math.random()*5)+"s";

        confetti.style.opacity=Math.random();

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },8000);
    }
}

function celebrate(){
    createConfetti();
}

// Auto start
window.onload=()=>{
    createConfetti();
}
</script>

</body>
</html>
